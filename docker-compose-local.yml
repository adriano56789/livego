version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: livego-mongodb-local
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=adriano123
    volumes:
      - mongodb_data:/data/db
    networks:
      - livego-network

networks:
  livego-network:
    driver: bridge

volumes:
  mongodb_data:
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf
    networks:
      - livego-network

  nginx:
    image: nginx:latest
    container_name: livego-nginx-local
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-livego.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - srs-server
    networks:
      - livego-network

volumes:
  mongodb_data:

networks:
  livego-network:
    driver: bridge
