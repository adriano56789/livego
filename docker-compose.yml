version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: livego-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    networks:
      - livego-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  srs:
    image: ossrs/srs:5
    container_name: livego-srs
    ports:
      - "1935:1935"  # RTMP
      - "1985:1985"  # HTTP API
      - "8080:8080"  # HLS/HTTP-FLV/WebRTC
      - "8000:8000/udp"  # WebRTC
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
    command: [
      "/usr/local/srs/objs/srs",
      "-c", "/usr/local/srs/conf/srs.conf"
    ]
    restart: always
    networks:
      - livego-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1985/api/v1/summaries"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: livego-livekit
    ports:
      - "7880:7880"  # WebSocket/HTTP
      - "7881:7881"  # RTC TCP
      - "3478:3478/udp"  # STUN
      - "50000-60000:50000-60000/udp"  # RTC UDP range
    environment:
      - LIVEKIT_CONFIG_FILE=/livekit.yaml
    volumes:
      - ./livekit.yaml:/livekit.yaml
    depends_on:
      mongodb:
        condition: service_healthy
      srs:
        condition: service_healthy
    restart: always
    networks:
      - livego-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: livego-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/livego?authSource=admin
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LIVEKIT_WS_URL=ws://livekit:7880
      - SRS_API_URL=http://srs:1985/api/v1
      - SRS_HTTP_URL=http://srs:8080
    depends_on:
      mongodb:
        condition: service_healthy
      srs:
        condition: service_healthy
      livekit:
        condition: service_healthy
    restart: always
    networks:
      - livego-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livego-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - livego-network
    restart: always

networks:
  livego-network:
    driver: bridge

volumes:
  mongodb_data:


