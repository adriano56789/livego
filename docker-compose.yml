services:
  coturn-server:
    image: coturn/coturn:latest
    container_name: coturn-server
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-65535:49152-65535/udp"
    environment:
      - TURN_USERNAME=livego
      - TURN_PASSWORD=livego123
      - REALM=livego.store
      - TURNSERVER_ENABLED=on
      - TURNLOG_ENABLED=on
      - DEBUG=0
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf
    networks:
      - livego-network

  srs-server:
    build:
      context: .
      dockerfile: Dockerfile.srs
      args:
        CONFARGS: ""
        MAKEARGS: "-j4"
        INSTALLDEPENDS: "YES"
    container_name: srs-server
    restart: unless-stopped
    ports:
      - "1935:1935/tcp"
      - "1985:1985/tcp"
      - "8080:8080/tcp"
      - "8000:8000/udp"
      - "9000:9000/tcp"
      - "5060:5060/tcp"
      - "10080:10080/udp"
    volumes:
      - ./srs-config:/usr/local/srs/conf
      - ./srs-logs:/usr/local/srs/objs/logs
    environment:
      - SRS_DAEMON=off
      - SRS_IN_DOCKER=on
      - TURN_SERVER_URL=turn:72.60.249.175:3478
      - TURN_USERNAME=livego
      - TURN_PASSWORD=adriano123
    depends_on:
      - coturn-server
    networks:
      - livego-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: livego-backend
    restart: unless-stopped
    ports:
      - "3000:3000/tcp"
    environment:
      - NODE_ENV=development
      - SRS_API_URL=http://srs-server:1985
      - SRS_RTMP_URL=rtmp://localhost:1935/live
      - SRS_HTTP_URL=http://localhost:8080
      - SRS_WEBRTC_URL=http://localhost:9000
    depends_on:
      - srs-server
    networks:
      - livego-network
    volumes:
      - ./backend:/app
      - /app/node_modules

networks:
  livego-network:
    driver: bridge

volumes:
  srs-config:
  srs-logs:
