services:
  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: unless-stopped
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    volumes:
      - ./livekit-config.yaml:/etc/livekit/livekit.yaml
    command: --config /etc/livekit/livekit.yaml
    networks:
      - livego-network

networks:
  livego-network: 
    driver: bridge

volumes:
  srs-config:
  srs-logs:
