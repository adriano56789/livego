<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveGo - Top Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
          overscroll-behavior: contain;
      }
      @keyframes audiowave {
        0% { transform: scaleY(0.1); }
        30% { transform: scaleY(0.8); }
        60% { transform: scaleY(0.3); }
        80% { transform: scaleY(1.0); }
        100% { transform: scaleY(0.1); }
      }
      .animate-audiowave {
          animation: audiowave 1.2s ease-in-out infinite;
          transform-origin: bottom;
      }
      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: inset 0 0 0 0px var(--glow-color, rgba(255, 255, 255, 0));
        }
        50% {
          box-shadow: inset 0 0 20px 5px var(--glow-color, rgba(255, 255, 255, 0.5));
        }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }

      /* Keyframes for PkClashAnimation */
      @keyframes clash-container-fade {
        0%, 85% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes aura-left {
        0% { transform: translateX(-100%); opacity: 0; }
        30% { transform: translateX(0); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes aura-right {
        0% { transform: translateX(100%); opacity: 0; }
        30% { transform: translateX(0); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes clash-left {
        0% { transform: translateX(-200px) scale(0.5); opacity: 0; }
        50% { transform: translateX(-50px) scale(1.1) rotate(-5deg); opacity: 1; }
        70% { transform: translateX(-60px) scale(1); }
        100% { transform: translateX(-60px) scale(1); }
      }
      @keyframes clash-right {
        0% { transform: translateX(200px) scale(0.5); opacity: 0; }
        50% { transform: translateX(50px) scale(1.1) rotate(5deg); opacity: 1; }
        70% { transform: translateX(60px) scale(1); }
        100% { transform: translateX(60px) scale(1); }
      }
      @keyframes impact-flash {
        0%, 50% { transform: scale(0); opacity: 0; }
        55% { transform: scale(300); opacity: 0.9; }
        100% { transform: scale(300); opacity: 0; }
      }
      @keyframes particle-burst {
        0% {
          transform: translate(0, 0) scale(0);
          opacity: 1;
        }
        100% {
          transform: 
            rotate(var(--angle)) 
            translateX(var(--distance)) 
            scale(1);
          opacity: 0;
        }
      }
      .animate-particle-burst {
        position: absolute;
        animation-name: particle-burst;
        animation-timing-function: cubic-bezier(0.1, 0.8, 0.7, 1);
        animation-fill-mode: forwards;
        opacity: 0; /* Start hidden */
      }
      
      @keyframes slide-in-bottom {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-in-bottom {
        animation: slide-in-bottom 0.25s ease-out forwards;
      }

       /* Keyframes for PK End Animation */
      @keyframes fade-in-out-long {
        0% { opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { opacity: 0; }
      }
      .animate-fade-in-out-long { animation: fade-in-out-long 4s ease-in-out forwards; }

      @keyframes slide-in-left-result {
        from { transform: translateX(-50px) scale(0.8); opacity: 0; }
        to { transform: translateX(0) scale(1); opacity: 1; }
      }
      .animate-slide-in-left-result { animation: slide-in-left-result 0.5s 0.2s ease-out backwards; }

      @keyframes slide-in-right-result {
        from { transform: translateX(50px) scale(0.8); opacity: 0; }
        to { transform: translateX(0) scale(1); opacity: 1; }
      }
      .animate-slide-in-right-result { animation: slide-in-right-result 0.5s 0.2s ease-out backwards; }

      /* Live indicator pulse animation */
      @keyframes pulse-live {
        0%, 100% { transform: scale(0.9); opacity: 1; }
        50% { transform: scale(1.4); opacity: 0.7; }
      }

      /* New Go Live button glow animation */
      @keyframes pulse-glow-button {
        0% {
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(236, 72, 153, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0);
        }
      }
      @keyframes protection-glow {
        0%, 100% {
          box-shadow: 0 0 5px #0ea5e9, 0 0 10px #0ea5e9, 0 0 15px #0ea5e9, 0 0 20px #0ea5e9;
        }
        50% {
          box-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee, 0 0 30px #22d3ee, 0 0 40px #22d3ee;
        }
      }
      .animate-protection-glow {
        animation: protection-glow 2.5s ease-in-out infinite;
      }

      /* Gift Combo Animation */
      @keyframes combo-thump {
        0% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(2.2) rotate(-10deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .animate-combo-thump {
        animation: combo-thump 0.25s ease-out;
        transform-origin: center;
      }
      
      /* Keyframes for slide-up-fast animation */
      @keyframes slide-up-fast {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .animate-slide-up-fast {
        animation: slide-up-fast 0.25s ease-out forwards;
      }

      /* Gift Display Animation Keyframes */
      @keyframes gift-banner-in {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes gift-banner-out {
        from { transform: translateY(0) scale(1); opacity: 1; }
        to { transform: translateY(-100%) scale(0.8); opacity: 0; }
      }
      .animate-gift-banner-in {
        animation: gift-banner-in 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .animate-gift-banner-out {
        animation: gift-banner-out 0.5s ease-out forwards;
      }
      
      /* Center Gift Animation Keyframes */
      @keyframes gift-display-in {
        from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      }
      @keyframes gift-display-out {
        from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        to { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      }
      .animate-gift-display-in {
        animation: gift-display-in 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .animate-gift-display-out {
        animation: gift-display-out 0.5s ease-out forwards;
      }

      /* Keyframes for Live Info Modal */
      @keyframes fade-in-out-short {
        0% { opacity: 0; transform: translateY(-20px); }
        10% { opacity: 1; transform: translateY(0); }
        90% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-20px); }
      }
      .animate-fade-in-out-short { animation: fade-in-out-short 5s ease-in-out forwards; }
      
      /* New Chat Bubble Style */
      .chat-bubble-new {
          background: linear-gradient(135deg, #a855f7, #6d28d9);
          border-radius: 16px;
          position: relative;
          padding: 8px 12px;
          color: white;
      }
      .chat-bubble-new .swoosh {
          position: absolute;
          width: 12px;
          height: 12px;
          border-style: solid;
          border-color: rgba(233, 213, 255, 0.6); /* purple-200 with opacity */
          border-width: 2px;
      }
      .chat-bubble-new .swoosh-tl {
          top: -4px;
          left: 15px;
          border-right-color: transparent;
          border-bottom-color: transparent;
          border-radius: 100% 0 0 0;
          transform: rotate(-35deg);
      }
      .chat-bubble-new .swoosh-tr {
          top: -4px;
          right: 15px;
          border-left-color: transparent;
          border-bottom-color: transparent;
          border-radius: 0 100% 0 0;
          transform: rotate(35deg);
      }

      /* Floating Gift Avatar Animation */
      @keyframes float-up {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-80px); opacity: 0; }
      }
      .animate-float-up {
          animation: float-up 4s ease-in-out forwards;
      }
      
      /* Floating Heart Animation */
      @keyframes float-up-and-away {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-250px) scale(0.5);
          opacity: 0;
        }
      }
      .animate-float-up-and-away {
        animation: float-up-and-away 2.5s ease-out forwards;
      }

      /* TikTok-style chat fade out */
      .chat-fade-out-top {
        -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 30%);
        mask-image: linear-gradient(to bottom, transparent 5%, black 30%);
      }

      /* Added fade-in animation for modals */
      @keyframes fade-in-fast {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-fade-in-fast {
        animation: fade-in-fast 0.2s ease-out forwards;
      }

      @keyframes fade-out-fast {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.95); }
      }
      .animate-fade-out-fast {
        animation: fade-out-fast 0.5s ease-in forwards;
      }


      /* Gift Roulette Animations (Old, can be removed or kept for other features) */
      @keyframes gift-roulette-spin {
        0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
        20% { transform: rotate(180deg) scale(1); opacity: 1; }
        80% { transform: rotate(1080deg) scale(1); opacity: 1; }
        100% { transform: rotate(1260deg) scale(0.5); opacity: 0; }
      }
      @keyframes gift-roulette-prize-glow {
        0% { opacity: 0; transform: scale(0.5) translateY(20px); }
        50% { opacity: 1; transform: scale(1.2) translateY(0); }
        100% { opacity: 0; transform: scale(1.5) translateY(-20px); }
      }
      .animate-gift-roulette-prize-glow {
        animation: gift-roulette-prize-glow 2s ease-in-out forwards;
      }

      /* New Roulette Widget Pulse */
      @keyframes roulette-pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.5);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 10px 5px rgba(236, 72, 153, 0);
        }
      }
      .animate-roulette-pulse {
          animation: roulette-pulse 2.5s infinite;
      }
      
      /* New Prize Wheel Animations */
      @keyframes prize-wheel-glow {
        0%, 100% { box-shadow: 0 0 15px #a855f7, 0 0 30px #a855f7; }
        50% { box-shadow: 0 0 25px #d8b4fe, 0 0 50px #d8b4fe; }
      }
      .animate-prize-wheel-glow {
        animation: prize-wheel-glow 2.5s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react/": "https://esm.sh/react@18.2.0/",
    "@lottiefiles/react-lottie-player": "https://esm.sh/@lottiefiles/react-lottie-player@3.5.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
