      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes float-up {
        0% {
          transform: translateY(0) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translateY(-500px) scale(1.2);
          opacity: 0;
        }
      }
      .animate-float-up {
        animation: float-up 5s ease-out forwards;
      }
    </style>
