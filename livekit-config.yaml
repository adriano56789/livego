# Configuração de logging
log_level: info

# Configuração de WebRTC - 144p @ 10FPS (baixo consumo)
rtc:
  # Configuração de codecs
  codecs:
    video:
      - vp8
    audio:
      - opus
  
  # Configuração de bandwidth - 144p @ 10FPS
  bandwidth:
    video:
      min: 64000   # 64kbps (144p @ 10FPS)
      max: 150000  # 150kbps máximo
    audio:
      min: 24000   # 24kbps
      max: 40000   # 40kbps máximo
  
  # Configuração de resolução e framerate
  layers:
    - width: 256
      height: 144
      framerate: 10
      bitrate: 64000

# Configuração de segurança - Produção
security:
  # Desativar conexões anônimas (produção)
  allow_anonymous: false
  
  # Configuração de CORS - Apenas domínios reais
  cors:
    allowed_origins:
      - https://livego.store
      - https://www.livego.store

# Configuração de room defaults
room:
  # Limite de participantes por sala
  max_participants: 100
  
