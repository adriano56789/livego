# Configuração Nginx para livego.store
# Redireciona HTTP para HTTPS e bloqueia acesso via IP

# Bloquear acesso direto via IP
server {
    listen 80 default_server;
    server_name _;
    
    # Negar todo acesso direto via IP
    return 444;
}

# Redirecionar HTTP para HTTPS no domínio
server {
    listen 80;
    server_name livego.store www.livego.store;
    
    # Redirecionar todo tráfego HTTP para HTTPS mantendo o domínio
    return 301 https://$server_name$request_uri;
}

# Configuração principal do domínio com HTTPS
server {
    listen 443 ssl http2;
    server_name livego.store www.livego.store;
    
    # Configuração SSL
    ssl_certificate /etc/letsencrypt/live/livego.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livego.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    
    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://livego.store ws://livego.store https://livego.store; media-src 'self' blob:; object-src 'none'; frame-src 'self'; base-uri 'self'; form-action 'self';";
    
    # Proxy reverso para backend na porta 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-SSL on;
        
        # Suporte para WebSocket
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # Prevenir redirecionamentos para IP
        proxy_redirect ~^http://[^/]+/(.*)$ https://$host/$1;
        proxy_redirect ~^https://[^/]+/(.*)$ https://$host/$1;
    }
    
    # Servir arquivos estáticos do frontend
    location /assets/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache para assets estáticos
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Log de acesso
    access_log /var/log/nginx/livego.store.access.log;
    error_log /var/log/nginx/livego.store.error.log;
}
