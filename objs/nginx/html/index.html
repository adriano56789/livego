    <script>
        // Função para mostrar/ocultar a barra de pesquisa
        document.addEventListener('DOMContentLoaded', function() {
            const searchButton = document.getElementById('search-button');
            const searchBar = document.getElementById('search-bar');
            const closeSearch = document.getElementById('close-search');
            const searchInput = document.getElementById('search-input');

            searchButton.addEventListener('click', function() {
                searchBar.style.display = 'block';
                searchInput.focus();
            });

            closeSearch.addEventListener('click', function() {
                searchBar.style.display = 'none';
            });

            // Fechar a barra de pesquisa ao pressionar ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    searchBar.style.display = 'none';
                }
            });

            // Buscar ao pressionar Enter
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const query = encodeURIComponent(searchInput.value.trim());
                    if (query) {
                        window.open(`https://www.google.com/search?q=${query}`, '_blank');
                        searchInput.value = '';
                        searchBar.style.display = 'none';
                    }
                }
            });
        });

        // Profile data
        const profilesData = [
            {
                id: 1,
                name: "1 foto 📸 1 vídeo",
                location: "Brasil",
                stats: 150,
                image: "https://images.unsplash.com/photo-1494790108755-2616b612b1ab?w=400&h=400&fit=crop&crop=face",

                isOnline: true,
            },
            {
                id: 3,
                name: "Casual Style",
                location: "Brasil",
                stats: 172,
                image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=400&fit=crop&crop=face",
            },
            {
                id: 4,
                name: "Grupo tele 📱 Help 3...",
                location: "Brasil",
                stats: 291,
                image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&h=400&fit=crop&crop=face",
                isOnline: true,
            },
            {
                id: 5,
                name: "Promoção chamada...",
                location: "Brasil",
                stats: 615,
                image: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400&h=400&fit=crop&crop=face",
            },
            {
                id: 6,
                name: "Priv grupal 🧡",
                location: "Peru",
                stats: 423,
                image: "https://images.unsplash.com/photo-1506863530036-1efeddceb993?w=400&h=400&fit=crop&crop=face",
                isOnline: true,
            },
            {
                id: 7,
                name: "Beach Vibes",
                location: "Brasil",
                stats: 187,
                image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&h=400&fit=crop&crop=face",
            },
            {
                id: 8,
                name: "Sweet Girl",
                location: "Brasil",
                stats: 334,
                image: "https://images.unsplash.com/photo-1520813792240-56fc4a3765a7?w=400&h=400&fit=crop&crop=face",
                isOnline: true,
            },
        ];

        // Stream configuration
        let streamConfig = {
            title: '',
            category: 'VIVER',
            isPrivate: false,
            allowComments: true
        };

        // Live stream state
        let mediaStream = null;
        let isLiveStreaming = false;
        let isMicOn = true;
        let isCameraOn = true;

        // Generate profile cards
        function createProfileCard(profile) {
            // Cada perfil aponta para uma página diferente (index4.html, index5.html, etc.)
            const streamPage = `index${3 + profile.id}.html`;
            return `
                <a href="${streamPage}" class="profile-card-link">
                    <div class="profile-card" data-id="${profile.id}">
                    <div class="card-image-container">
                        <img src="${profile.image}" alt="${profile.name}" class="card-image">
                        <div class="image-overlay"></div>
                        
                        ${profile.isOnline ? '<div class="online-indicator"></div>' : ''}
                        
                        ${profile.hasSpecial ? '<div class="special-indicators"><span>❤️</span><span>🎥</span></div>' : ''}
                        
                        <div class="card-content">
                            <h3 class="card-name">${profile.name}</h3>
                            <div class="card-info">
                                <div class="card-location">
                                    <svg class="icon-sm" viewBox="0 0 24 24">
                                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                                        <circle cx="12" cy="10" r="3"></circle>
                                    </svg>
                                    <span>${profile.location}</span>
                                </div>
                                <div class="card-stats">
                                    <svg class="icon-sm" viewBox="0 0 24 24">
                                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="9" cy="7" r="4"></circle>
                                        <path d="M22 11l-3-3 3-3"></path>
                                        <path d="M16 3h5v5"></path>
                                    </svg>
                                    <span>${profile.stats}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </a>
            `;
        }

        // Initialize the grid
        function initializeGrid() {
            const gridContainer = document.getElementById('profiles-grid');
            gridContainer.innerHTML = profilesData.map(createProfileCard).join('');
        }

        // Handle bottom navigation
        function initializeNavigation() {
            const navTabs = document.querySelectorAll('.nav-tab');
            
            navTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Handle home tab special functionality
                    if (tab.dataset.tab === 'home') {
                        openLiveSetup();
                        return;
                    }
                    
                    // Remove active class from all tabs
                    navTabs.forEach(t => t.classList.remove('active'));
                    
                    // Add active class to clicked tab (except for the purple one)
                    if (!tab.classList.contains('purple')) {
                        tab.classList.add('active');
                    }
                    
                    console.log(`Navegando para: ${tab.dataset.tab}`);
                });
            });
        }

        // Handle profile card clicks
        function initializeProfileCards() {
            document.addEventListener('click', (e) => {
                const profileCard = e.target.closest('.profile-card');
                if (profileCard) {
                    const profileId = profileCard.dataset.id;
                    const profile = profilesData.find(p => p.id == profileId);
                    console.log(`Perfil clicado:`, profile);
                }
            });
        }

        // Live stream setup functions
        function openLiveSetup() {
            document.getElementById('live-setup-modal').classList.add('show');
        }

        function closeLiveSetup() {
            document.getElementById('live-setup-modal').classList.remove('show');
        }

        // Category selection
        function initializeCategoryButtons() {
            const categoryButtons = document.querySelectorAll('.category-btn');
            categoryButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    streamConfig.category = btn.dataset.category;
                });
            });
        }

        // Toggle switches
        function initializeToggles() {
            const privateToggle = document.getElementById('private-toggle');
            const commentsToggle = document.getElementById('comments-toggle');

            privateToggle.addEventListener('click', () => {
                privateToggle.classList.toggle('active');
                streamConfig.isPrivate = privateToggle.classList.contains('active');
            });

            commentsToggle.addEventListener('click', () => {
                commentsToggle.classList.toggle('active');
                streamConfig.allowComments = commentsToggle.classList.contains('active');
            });
        }

        // Stream title input
        function initializeStreamTitle() {
            const titleInput = document.getElementById('stream-title');
            const startBtn = document.getElementById('start-stream-btn');

            titleInput.addEventListener('input', () => {
                streamConfig.title = titleInput.value.trim();
                startBtn.disabled = !streamConfig.title;
            });
        }

        // Iniciar transmissão ao vivo
        async function startLiveStream() {
            const streamerName = document.getElementById('streamer-name').value.trim();
            const streamTitle = document.getElementById('stream-title').value.trim();
            
            if (!streamerName) {
                alert('Por favor, digite seu nome');
                return false;
            }
            
            if (!streamTitle) {
                alert('Por favor, digite um título para a transmissão');
                return false;
            }
            
            // Codifica os parâmetros para a URL
            const encodedName = encodeURIComponent(streamerName);
            const encodedTitle = encodeURIComponent(streamTitle);
            
            // Redireciona para index4.html com os parâmetros
            window.location.href = `index4.html?name=${encodedName}&title=${encodedTitle}`;
            return false;
            
            try {
                // Tenta acessar a câmera e o microfone
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                }).catch(error => {
                    console.error('Erro ao acessar dispositivos:', error);
                    throw error;
                });

                // Configura o elemento de vídeo
                const videoElement = document.getElementById('live-video');
                if (videoElement) {
                    videoElement.srcObject = mediaStream;
                }

                // Fecha o modal de configuração e mostra a transmissão
                closeLiveSetup();
                const liveContainer = document.getElementById('live-stream-container');
                if (liveContainer) {
                    liveContainer.classList.add('active');
                }
                
                isLiveStreaming = true;
                
                // Simula contagem de visualizadores
                simulateViewerCount();
                
                console.log('Transmissão iniciada:', streamConfig);
                
            } catch (error) {
                console.error('Erro ao acessar câmera/microfone:', error);
                alert('Não foi possível acessar a câmera/microfone. Verifique as permissões do navegador.');
            }
        }

        // End live stream
        function endLiveStream() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            document.getElementById('live-stream-container').classList.remove('active');
            isLiveStreaming = false;
            
            console.log('Transmissão encerrada');
        }

        // Toggle microphone
        function toggleMic() {
            if (mediaStream) {
                const audioTrack = mediaStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isMicOn = audioTrack.enabled;
                    
                    const micBtn = document.getElementById('mic-btn');
                    if (isMicOn) {
                        micBtn.classList.remove('muted');
                    } else {
                        micBtn.classList.add('muted');
                    }
                }
            }
        }

        // Toggle camera
        function toggleCamera() {
            if (mediaStream) {
                const videoTrack = mediaStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    isCameraOn = videoTrack.enabled;
                    
                    const cameraBtn = document.getElementById('camera-btn');
                    if (isCameraOn) {
                        cameraBtn.classList.remove('off');
                    } else {
                        cameraBtn.classList.add('off');
                    }
                }
            }
        }

        // Simulate viewer count
        function simulateViewerCount() {
            let viewerCount = 0;
            const viewerCountElement = document.getElementById('viewer-count');
            
            const interval = setInterval(() => {
                if (!isLiveStreaming) {
                    clearInterval(interval);
                    return;
                }
                
                // Simulate viewer count changes
                const change = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
                viewerCount = Math.max(0, viewerCount + change);
                viewerCountElement.textContent = viewerCount;
            }, 2000);
        }

        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            initializeGrid();
            initializeNavigation();
            initializeProfileCards();
            initializeCategoryButtons();
            initializeToggles();
            initializeStreamTitle();
        });
    </script>

    <script>
        // Função para abrir o modal de tela cheia
        function openFullscreenModal(content) {
            const modal = document.getElementById('fullscreen-modal');
            const modalBody = modal.querySelector('.modal-body');
            
            // Define o conteúdo do modal se fornecido
            if (content) {
                modalBody.innerHTML = content;
            }
            
            // Exibe o modal
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Impede a rolagem da página
        }

        // Função para fechar o modal
        function closeFullscreenModal() {
            const modal = document.getElementById('fullscreen-modal');
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Restaura a rolagem da página
        }

        // Adiciona o evento de clique no botão de casa
        document.addEventListener('DOMContentLoaded', () => {
            const homeButton = document.getElementById('home-button');
            if (homeButton) {
                homeButton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Previne a propagação do evento
                    openFullscreenModal('<h2>Bem-vindo à Página Inicial</h2><p>Conteúdo da página inicial será exibido aqui.</p>');
                });
            }

            const closeButton = document.getElementById('close-fullscreen-modal');
            if (closeButton) {
                closeButton.addEventListener('click', closeFullscreenModal);
            }

            // Fecha o modal ao pressionar a tecla ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeFullscreenModal();
                }
            });

            // Fecha o modal ao clicar fora do conteúdo
            const modal = document.getElementById('fullscreen-modal');
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeFullscreenModal();
                    }
                });
            }
        });
    </script>

    <style>
        /* Estilos para o modal de tela cheia */
        .home-button-container {

        .fullscreen-modal {

            top: 0;

        .fullscreen-modal.active {
            display: flex;

            align-items: center;
            opacity: 1;

        .fullscreen-modal .modal-content {
            background: #1f2937;

            width: 600px;
