version: '3.8'

services:
  # Servidor STUN/TURN combinado (coturn)
  coturn:
    image: coturn/coturn:latest
    container_name: livego-coturn
    ports:
      - "3478:3478/udp"     # STUN/TURN UDP
      - "3478:3478/tcp"     # STUN/TURN TCP
      - "5349:5349/tcp"     # TURN TLS
      - "49152-65535:49152-65535/udp"  # Relay ports
    environment:
      # Credenciais TURN
      - TURN_USERNAME=livego
      - TURN_PASSWORD=livego123
      
      # Configuração STUN/TURN
      - REALM=livego
      - USE_AUTH_SECRET=true
      - STATIC_AUTH_SECRET=livego-secret-key-2024
      
      # IPs do servidor
      - EXTERNAL_IP=72.60.249.175
      - LISTENING_IP=0.0.0.0
      - RELAY_IP=72.60.249.175
      
      # Limites
      - TOTAL_QUOTA=1000
      - USER_QUOTA=120
      - MAX_BPS=128000
      
      # Portas
      - LISTENING_PORT=3478
      - TLS_LISTENING_PORT=5349
      
      # Segurança
      - NO_TLSV1=true
      - NO_TLSV1_1=true
      - NO_STDOUT_LOG=true
      
      # Logging
      - LOG_FILE=/var/log/turnserver.log
      - SIMPLE_LOG=true
      
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf
      - ./logs:/var/log
    networks:
      - livego-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-T", "-u", "livego", "-w", "livego123", "72.60.249.175:3478"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Servidor SRS (Simple Realtime Server)
  srs:
    image: ossrs/srs:5
    container_name: livego-srs
    ports:
      - "1935:1935/tcp"     # RTMP
      - "8080:8080/tcp"     # HTTP API
      - "8000:8000/tcp"     # HTTP HLS
      - "8088:8088/tcp"     # HTTP FLV
      - "10080:10080/udp"   # WebRTC UDP
    environment:
      - CANDIDATE=72.60.249.175
      - WEBRTC=enabled
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - ./logs:/usr/local/srs/objs/logs
    networks:
      - livego-network
    restart: unless-stopped
    depends_on:
      - coturn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/summaries"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  livego-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
