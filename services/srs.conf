# Configuração do SRS (Simple Realtime Server)
# Para WebRTC com STUN/TURN

listen              1935;
max_connections     1000;
srs_log_tank       console;
srs_log_level      info;
http_server         on;
http_reload         on;
http_stream_listen  8080;
http_api            on;
http_api_listen     8080;
http_https          on;
http_https_listen   8443;
ssl_cert            ./conf/livego.crt;
ssl_key             ./conf/livego.key;

# Configuração WebRTC
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}
http_api {
    enabled         on;
    listen          8080;
    raw_api {
        enabled         on;
        allow_reload     on;
    }
}
rtc_server {
    enabled         on;
    listen          10080;
    # Configuração STUN/TURN
    candidate       72.60.249.175;
    # STUN
    stun_server     72.60.249.175;
    stun_port       3478;
    # TURN
    turn_server     72.60.249.175;
    turn_port       3478;
    turn_username   livego;
    turn_password   livego123;
    # Relay
    relay          on;
    # Codecs
    publish_codecs  opus,h264,vp8,vp9,av1;
    play_codecs    opus,h264,vp8,vp9,av1;
    # Buffer
    queue_length    500;
    # Jitter buffer
    jitter_buffer   on;
    # RTCP
    rtcp            on;
    # TWCC
    twcc            on;
    # RED/FEC
    red_fec         on;
}

# Configuração HLS
vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path       ./objs/nginx/html;
        hls_fragment   10;
        hls_window     60;
        hls_cleanup    on;
        hls_dispose    300;
        hls_keys       on;
        hls_fragments_per_key 6;
        hls_m3u8_file  [app]/[stream].m3u8;
        hls_ts_file    [app]/[stream]-[seq].ts;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    dvr {
        enabled     on;
        dvr_path    ./objs/nginx/html;
        dvr_plan    session;
    }
}

# Segurança
security {
    enabled         on;
    allow_publish   all;
    allow_play     all;
}

# Performance
performance {
    # Worker threads
    pworker_threads    2;
    # Fast cache
    fast_cache         100;
    # Merge read
    mr {
        enabled         on;
        latency         350;
    }
    # Publish
    publish {
        first_jitter     300;
        normal_jitter   4500;
    }
    # Play
    play {
        twcc            on;
        gop_cache        10;
        queue_length     30;
    }
}

# Heartbeat
heartbeat {
    enabled         on;
    interval        9900;
    timeout         25000;
    fast            8000;
    slow            25000;
}
