version: '3.8'

services:
  # TURN Server América do Sul
  turn-br:
    image: coturn/coturn:latest
    container_name: livego-turn-br
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49152-65535:49152-65535/udp"
    environment:
      - REALM=livego-br
      - EXTERNAL_IP=72.60.249.175
      - LISTENING_IP=0.0.0.0
      - RELAY_IP=72.60.249.175
      - TOTAL_QUOTA=2000
      - USER_QUOTA=120
      - MAX_BPS=256000
      - LISTENING_PORT=3478
      - TLS_LISTENING_PORT=5349
      - NO_TLSV1=true
      - NO_TLSV1_1=true
      - LOG_FILE=/var/log/turnserver.log
      - SIMPLE_LOG=true
    volumes:
      - ./turnserver-br.conf:/etc/coturn/turnserver.conf
      - ./logs:/var/log
    networks:
      - livego-cluster
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-T", "-u", "livego", "-w", "livego123", "72.60.249.175:3478"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TURN Server América do Norte
  turn-us:
    image: coturn/coturn:latest
    container_name: livego-turn-us
    ports:
      - "3479:3478/udp"
      - "3479:3479/tcp"
      - "5350:5349/tcp"
    environment:
      - REALM=livego-us
      - EXTERNAL_IP=104.21.45.100
      - LISTENING_IP=0.0.0.0
      - RELAY_IP=104.21.45.100
      - TOTAL_QUOTA=2000
      - USER_QUOTA=120
      - MAX_BPS=256000
      - LISTENING_PORT=3478
      - TLS_LISTENING_PORT=5349
    networks:
      - livego-cluster
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # TURN Server Europa
  turn-eu:
    image: coturn/coturn:latest
    container_name: livego-turn-eu
    ports:
      - "3480:3478/udp"
      - "3480:3478/tcp"
      - "5351:5349/tcp"
    environment:
      - REALM=livego-eu
      - EXTERNAL_IP=104.21.67.200
      - LISTENING_IP=0.0.0.0
      - RELAY_IP=104.21.67.200
      - TOTAL_QUOTA=2000
      - USER_QUOTA=120
      - MAX_BPS=256000
      - LISTENING_PORT=3478
      - TLS_LISTENING_PORT=5349
    networks:
      - livego-cluster
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

networks:
  livego-cluster:
    driver: overlay
    attachable: true
