# Configuração do Servidor TURN (coturn)

# Porta de escuta
listening-port=3478
tls-listening-port=5349

# IPs do servidor
listening-ip=0.0.0.0
relay-ip=72.60.249.175
external-ip=72.60.249.175

# Realm
realm=livego

# Autenticação
use-auth-secret
static-auth-secret=livego-secret-key-2024

# Credenciais (alternativa ao secret)
#user=livego:livego123

# Limites e quotas
total-quota=1000
user-quota=120
max-bps=128000

# Portas para relay (UDP)
min-port=49152
max-port=65535

# Segurança
no-tlsv1
no-tlsv1_1
no-stdout-log
no-loopback-peers
no-multicast-peers

# TLS (opcional, descomentar se tiver certificado)
#cert=/etc/ssl/certs/livego.crt
#pkey=/etc/ssl/private/livego.key
#dh-file=/etc/ssl/certs/dhparam.pem

# Logging
log-file=/var/log/turnserver.log
simple-log
verbose

# Mobilidade (para celulares)
mobility

# Fingerprinting
fingerprint

# WebRTC suporte
use-fingerprint
lt-cred-mech

# Redis (opcional, para múltiplas instâncias)
#redis-statsdb="redis://localhost:6379/0"
#redis-userdb="redis://localhost:6379/1"
