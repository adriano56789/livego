listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

stats {
    network         0;
}

rtc_server {
    enabled         on;
    listen          8000; # UDP port for WebRTC
    # IP público do servidor para candidatos ICE - ESSENCIAL para conexões externas
    candidate       72.60.249.175;
    # Forçar uso do IP público específico
    use_auto_detect_network_ip  off;
    # Habilitar STUN para clientes externos
    stun_enabled     on;
    stun_port        3478;
    # Configurações para mobile/externas
    dtls_enabled     on;
    # Timeout maior para redes móveis
    network_timeout     10000;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      12;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        # Multi-bitrate HLS
        hls_on_error    ignore;
        hls_variant     _low bandwidth=400000;
        hls_variant     _medium bandwidth=800000;
        hls_variant     _high bandwidth=1500000;
    }
    
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    
    rtc {
        enabled         on;
        # rtmp_to_rtc permite que streamers RTMP (OBS) sejam vistos via WebRTC
        rtmp_to_rtc     on;
        # rtc_to_rtmp permite que streamers WebRTC sejam vistos via RTMP/HLS
        rtc_to_rtmp     on;
        # Simulcast para múltiplas qualidades
        simulcast       on;
        # Transcodificação para diferentes resoluções
        transcode {
            enabled     on;
            # Perfis de transcodificação
            vcodec      libx264;
            acodec      libaac;
            # 240p - Baixa qualidade
            vprofile    baseline;
            vlevel      3.0;
            vbitrate    400;
            preset      ultrafast;
            # 480p - Qualidade média  
            vprofile    main;
            vlevel      3.1;
            vbitrate    800;
            preset      fast;
            # 720p - Alta qualidade
            vprofile    high;
            vlevel      3.1;
            vbitrate    1500;
            preset      medium;
        }
    }
    
    tcp_nodelay     on;
    min_latency     on;
    
    play {
        gop_cache       off;
        queue_length    10;
        mw_latency      100;
    }
    
    publish {
        mr          off;
        # Aceitar múltiplos bitrates
        mr_latency   350;
    }
    
    # Configurações para DVR e gravação
    dvr {
        enabled     off;
    }
}
