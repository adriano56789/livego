# SRS Media Server Configuration - Local Development
# Baseado na documentação oficial: https://ossrs.net/lts/en-us/docs/v6/

# Configurações Globais
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

# Servidor HTTP para painel e players
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# API HTTP para controle e monitoramento
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
    raw_api {
        enabled     on;
        allow_reload on;
        allow_query  on;
        allow_update on;
    }
    # Autenticação desabilitada para desenvolvimento
    auth {
        enabled     off;
    }
}

# Estatísticas do servidor - Configuração completa para monitoramento
stats {
    network         0;
    disk            sda xvda vda;
}

# Heartbeat para detectar clientes ativos
heartbeat {
    enabled         off;
}

# Servidor WebRTC - Configuração completa baseada na documentação SRS
rtc_server {
    enabled         on;
    listen          8000;
    
    # Configuração de Candidate - ESSENCIAL para WebRTC funcionar
    # Usar IP local para desenvolvimento
    candidate       127.0.0.1;
    
    # Detectar IP automaticamente como fallback
    use_auto_detect_network_ip on;
    
    # Apenas IPv4
    ip_family       ipv4;
    
    # Protocolo UDP para WebRTC
    protocol       udp;
    
    # STUN server para NAT traversal - ESSENCIAL!
    stun_enabled     on;
    stun_server     "stun:stun.l.google.com:19302";
    stun_port        19302;
    
    # TURN server para conexões restritas
    turn_enabled     on;
    turn_server      "turn:numb.viagenie.ca:3478";
    turn_username    "livego";
    turn_password    "livego123";
}

# Host Virtual padrão - Configuração completa para registro de clientes
vhost __defaultVhost__ {
    # Configurações de baixa latência
    min_latency    on;
    tcp_nodelay    on;
    chunk_size     128;
    
    # Habilitar registro detalhado de clientes - USAR ENDPOINT EXISTENTE
    http_hooks {
        enabled         on;
        on_connect      http://localhost:3000/api/srs/callback;
        on_close         http://localhost:3000/api/srs/callback;
        on_publish       http://localhost:3000/api/srs/callback;
        on_unpublish     http://localhost:3000/api/srs/callback;
        on_play          http://localhost:3000/api/srs/callback;
        on_stop          http://localhost:3000/api/srs/callback;
    }
    
    # Configurações de Publicação (RTMP/WebRTC)
    publish {
        mr                  off;
        mr_latency          350;
        firstpkt_timeout    20000;
        normal_timeout      7000;
        parse_sps           on;
        try_annexb_first   on;
        kickoff_for_idle    0;
        # Permitir publicação sem autenticação para desenvolvimento
        publish_wait_sps    on;
        publish_firstpkt_timeout 20000;
        publish_normal_timeout 7000;
    }
    
    # Configurações de Reprodução
    play {
        gop_cache           off;  # Desabilitado para mínima latência
        gop_cache_max_frames 2500;
        queue_length        10;
        time_jitter         full;
        atc                 off;
        mix_correct         off;
        atc_auto           off;
        mw_latency         350;
        mw_msgs            8;
        send_min_interval  10.0;
        reduce_sequence_header on;
    }
    
    # Configuração WebRTC para este vhost - COMPLETA
    rtc {
        enabled             on;
        nack                on;
        twcc                on;
        
        # Transmuxing RTMP para WebRTC
        rtmp_to_rtc         on;
        
        # Transmuxing WebRTC para RTMP
        rtc_to_rtmp         on;
        
        # Configurações avançadas para WebRTC
        webrtc {
            enabled         on;
            # Remuxing automático
            remux {
                enabled     on;
                to_rtmp     on;
                to_rtc      on;
                to_http     on;
            }
            # Configurações de codec
            codec {
                h264        on;
                aac         on;
                opus        on;
            }
            # Configurações de qualidade
            quality {
                profile     "high";
                level       "4.1";
            }
        }
        
        # Plan B para WebRTC (compatibilidade)
        plan_b            on;
        
        # Timeout para WebRTC
        webrtc_timeout    30000;
        
        # Habilitar API para WebRTC
        api_enabled       on;
        
        # Habilitar estatísticas detalhadas
        stats_enabled     on;
    }
    
    # HTTP-FLV para streaming de baixa latência
    http_remux {
        enabled             on;
        mount               [vhost]/[app]/[stream].flv;
    }
    
    # HLS para compatibilidade - CORRIGIDO E ATIVADO
    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_fragment        6;
        hls_window          60;
        hls_cleanup         on;
        hls_dispose         0;
        hls_nb_notify       100;
        hls_wait_keyframe  on;
        hls_acodec         aac;
        hls_vcodec         h264;
        hls_dts_directly   on;
    }
    
    # DVR para gravação de streams (opcional)
    dvr {
        enabled             off;
        dvr_path            ./objs/nginx/html/dvr;
        dvr_plan            session;
        dvr_wait_keyframe   on;
        dvr_segment_duration    30;
        dvr_segment_count       10;
    }
}
