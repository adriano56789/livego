# SRS Media Server - Configuração Mínima para Desenvolvimento
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
    auth {
        enabled     off;
    }
    http_hooks {
        enabled         on;
        on_publish http://localhost:3000/api/srs/callback;
        on_play http://localhost:3000/api/srs/callback;
        on_unpublish http://localhost:3000/api/srs/callback;
        on_stop http://localhost:3000/api/srs/callback;
    }
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       192.168.3.12;
    use_auto_detect_network_ip on;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      60;
    }
    
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     on;
    }
    
    publish {
        mr              off;
    }
    
    play {
        gop_cache       off;
    }
}
