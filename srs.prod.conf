# SRS Media Server Configuration - Production
# Baseado na documentação oficial: https://ossrs.net/lts/en-us/docs/v6/

# Configurações Globais
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

# Servidor HTTP para painel e players
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# API HTTP para controle e monitoramento
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
    raw_api {
        enabled     off;
        allow_reload off;
    }
    auth {
        enabled     on;
        username    admin;
        password    admin;
    }
}

# Estatísticas do servidor
stats {
    network         0;
}

# Servidor WebRTC - Configuração para produção
rtc_server {
    enabled         on;
    listen          8000;
    
    # IP público do servidor para produção
    candidate       72.60.249.175;
    
    # Não detectar IP automaticamente em produção
    use_auto_detect_network_ip off;
    
    # Apenas IPv4
    ip_family       ipv4;
    
    # Protocolo: UDP (padrão)
    protocol       udp;
    
    # STUN para NAT traversal em produção
    stun_enabled    on;
    stun_port       3478;
}

# Host Virtual padrão - Configuração completa
vhost __defaultVhost__ {
    # Configurações de baixa latência
    min_latency    off;
    tcp_nodelay    off;
    chunk_size     128;
    
    # Configurações de Publicação (RTMP)
    publish {
        mr                  off;
        mr_latency          350;
        firstpkt_timeout    20000;
        normal_timeout      7000;
        parse_sps           on;
        try_annexb_first   on;
        kickoff_for_idle    0;
    }
    
    # Configurações de Reprodução
    play {
        gop_cache           off;  # Desabilitado para mínima latência
        gop_cache_max_frames 2500;
        queue_length        10;
        time_jitter         full;
        atc                 off;
        mix_correct         off;
        atc_auto           off;
        mw_latency         350;
        mw_msgs            8;
        send_min_interval  10.0;
        reduce_sequence_header on;
    }
    
    # Configuração WebRTC para este vhost
    rtc {
        enabled             on;
        nack                on;
        twcc                on;
        
        # Transmuxing RTMP para WebRTC
        rtmp_to_rtc         on;
        
        # Transmuxing WebRTC para RTMP
        rtc_to_rtmp         on;
    }
    
    # HTTP-FLV para streaming de baixa latência
    http_remux {
        enabled             on;
        mount               [vhost]/[app]/[stream].flv;
    }
    
    # HLS para compatibilidade - ATIVADO PARA PRODUÇÃO
    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_fragment        6;
        hls_window          60;
        hls_cleanup         on;
        hls_dispose         0;
        hls_nb_notify       100;
        hls_wait_keyframe  on;
        hls_acodec         aac;
        hls_vcodec         h264;
    }
}
