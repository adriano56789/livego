# Coturn TURN server configuration
# STUN/TURN server para WebRTC do LiveGo

# Rede e portas
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Relay de portas para TURN
min-port=49152
max-port=65535

# Autenticação
use-auth-secret
static-auth-secret=livego123secret
realm=livego.store
total-quota=100
user-quota=12
max-bps=64000

# STUN/TURN URLs
server-name=livego.store
# Fingerprint e certificados (auto-generado)
fingerprint
lt-cred-mech

# Log
log-file=/var/log/turnserver.log
verbose

# Mobile e IPv6 support
mobility
no-cli
no-tlsv1
no-tlsv1_1

# Redis (opcional, para sessões persistentes)
# redis-statsdb="ip=redis-server port=6379"

# Configurações de segurança
no-multicast-peers
no-loopback-peers
allow-loopback-peers
microsoft-compatibility
