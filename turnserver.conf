# Coturn TURN server configuration - Configurado para redes externas
# STUN/TURN server para WebRTC do LiveGo

# Rede e portas - Configuração para acesso externo
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
# IP público para relay ESSENCIAL para conexões externas
external-ip=72.60.249.175

# Relay de portas para TURN - Faixa completa para mobile
min-port=49152
max-port=65535

# Autenticação
use-auth-secret
static-auth-secret=livego123secret
realm=livego.store
total-quota=100
user-quota=12
max-bps=64000

# STUN/TURN URLs
server-name=72.60.249.175

# Mobile e IPv6 support - ESSENCIAL para celulares
mobility
no-tlsv1
no-tlsv1_1
# Suporte a TCP para redes restritivas
tcp-port=3478

# PID file - caminho Windows
pidfile=C:\Users\adria\OneDrive\Documentos\Área de Trabalho\livego\turnserver.pid

# Certificados - caminhos corretos para Windows
cert=C:\Users\adria\OneDrive\Documentos\Área de Trabalho\livego\turn_server_cert.pem
pkey=C:\Users\adria\OneDrive\Documentos\Área de Trabalho\livego\turn_server_pkey.pem

# Fingerprint e mecanismos
fingerprint
lt-cred-mech

# Log - caminho Windows
log-file=C:\Users\adria\OneDrive\Documentos\Área de Trabalho\livego\turnserver.log
verbose

# CLI password para habilitar interface
cli-password=livego_cli_2024

# Configurações de segurança para redes externas
no-multicast-peers
allow-loopback-peers
microsoft-compatibility

# Otimizações para mobile
keep-alive-interval=30
stale-nonce=600
max-message-size=65536
